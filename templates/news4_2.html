<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sassy Math Squad</title>
    <style>
        :root {
            --maya-bg: #ffffff; 
            --sam-bg: #e1ffc7;   
            --accent: #128c7e;   
            --bg-color: #d1d7db;
            --app-height: 100dvh; 
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: var(--app-height); 
            margin: 0; 
            overflow: hidden;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111 0%, #333 100%); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 100; color: white; text-align: center;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 350px;
            width: 90%;
        }

        .start-btn { 
            display: inline-block;
            width: 100%;
            padding: 18px 0;
            font-size: 1.1rem; 
            cursor: pointer; 
            border-radius: 15px; 
            border: none; 
            background: #25d366; 
            color: white; 
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
        }

        #game-window {
            width: 100%; 
            max-width: 500px;
            height: var(--app-height);
            background: white; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @media (min-width: 600px) {
            #game-window { height: 90vh; border-radius: 15px; }
        }

        .header {
            background: #075e54; color: white; padding: 15px;
            display: flex; align-items: center;
            flex-shrink: 0;
        }

        #chat-history {
            flex: 1; 
            padding: 15px; 
            overflow-y: auto;
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            -webkit-overflow-scrolling: touch; 
        }

        .bubble {
            max-width: 85%; padding: 10px 14px; border-radius: 12px;
            font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            animation: pop 0.25s ease-out; position: relative;
            line-height: 1.4;
        }

        @keyframes pop { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .maya { align-self: flex-start; background-color: var(--maya-bg); border-top-left-radius: 0; }
        .sam { align-self: flex-start; background-color: #dcf8c6; border-top-left-radius: 0; margin-left: 10px;}
        .player { align-self: flex-end; background-color: #34b7f1; color: white; border-top-right-radius: 0; }

        .name { font-weight: bold; font-size: 0.75rem; display: block; margin-bottom: 2px; }
        .maya-name { color: #e91e63; }
        .sam-name { color: #2196f3; }

        .controls { padding: 10px 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        button#send-btn { background-color: #128c7e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .typing { font-size: 0.8rem; color: #555; padding: 5px 20px; font-style: italic; background: #e5ddd5; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="menu-card">
        <div style="font-size: 4rem;">🤪</div>
        <h1>The Chaos Chat</h1>
        <p>Maya is smart, Sam is confused.<br><b>You are the hero.</b></p>
        <button class="start-btn" onclick="startGame()">Enter Group Chat</button>
    </div>
</div>

<div id="game-window">
    <div class="header">
    <a href="/" style="text-decoration: none; color: white; margin-right: 15px; font-size: 1.2rem;">←</a>
    <div style="font-size: 24px; margin-right: 12px;">🍕</div>
    <div style="flex: 1;">
        <div style="font-weight: bold; font-size: 1.1rem;">Homework Haters 🚫📚</div>
        <div style="font-size: 0.75rem; opacity: 0.9;">Maya, Sam, You</div>
    </div>
</div>
    <div id="chat-history"></div>
    <div id="typing-indicator" class="typing" style="display: none;">Someone is typing...</div>
    <div class="controls">
        <input type="number" id="user-input" placeholder="Type a number..." inputmode="numeric">
        <button id="send-btn" onclick="handleUserSubmit()">➔</button>
    </div>
</div>

<script>
    const pingSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');

    const scenarioData = [
        {
            messages: [
                { s: "Maya", t: "Guys, I found a 'Mystery Number' note. If we solve it, we get free pizza! 🍕", c: "maya" },
                { s: "Sam", t: "PIZZA?! I'm in. What's the code?", c: "sam" },
                { s: "Maya", t: "Multiply a number (x) by 5, add 15, and the result is 65. Go!", c: "maya" },
                { s: "Sam", t: "Wait... 🖥️ If we take away 15 from 65, that's 50. So 5 times WHAT is 50?", c: "sam" }
            ],
            answer: 10,
            hint: "Maya: Sam... please. 50 divided by 5. You have ten fingers!"
        },
        {
            messages: [
                { s: "Sam", t: "Bad news. I went to the bookstore for pens and came out broke. 💸", c: "sam" },
                { s: "Maya", t: "Typical Sam. What happened?", c: "maya" },
                { s: "Sam", t: "I got 3 notebooks for Rs 18 each and 2 fancy pens. Total was Rs 74!", c: "sam" },
                { s: "Maya", t: "The notebooks cost Rs 54. So the 2 pens cost Rs 20 together. How much for ONE pen?", c: "maya" }
            ],
            answer: 10,
            hint: "Sam: Help! If 2 pens are 20 bucks, how much is one? My wallet is crying."
        },
        {
            messages: [
                { s: "Maya", t: "Okay, last one. We're on a train to the Pizza Party! 🚂", c: "maya" },
                { s: "Sam", t: "Are we there yet? We've gone 120 km in 2 hours.", c: "sam" },
                { s: "Maya", t: "The party is 300 km away. If we keep going 60 km every hour, how many total hours until we get there?", c: "maya" }
            ],
            answer: 5,
            hint: "Maya: Count by 60s, Sam! 60, 120, 180, 240, 300... how many hours is that?"
        }
    ];

    let currentScenario = 0;

    userInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            handleUserSubmit();
        }
    });

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        loadScenario();
    }

    async function addMessage(sender, text, type) {
        return new Promise(resolve => {
            const indicator = document.getElementById('typing-indicator');
            indicator.innerText = `${sender} is typing...`;
            indicator.style.display = "block";
            chatHistory.scrollTop = chatHistory.scrollHeight;

            setTimeout(() => {
                indicator.style.display = "none";
                pingSound.currentTime = 0; 
                pingSound.play().catch(e => {});
                
                const div = document.createElement('div');
                div.className = `bubble ${type}`;
                div.innerHTML = `<span class="name ${type}-name">${sender}</span>${text}`;
                chatHistory.appendChild(div);
                chatHistory.scrollTop = chatHistory.scrollHeight;
                resolve();
            }, 1200);
        });
    }

    async function loadScenario() {
        const scene = scenarioData[currentScenario];
        for (let msg of scene.messages) {
            await addMessage(msg.s, msg.t, msg.c);
        }
    }

    async function handleUserSubmit() {
        const val = parseInt(userInput.value);
        if (isNaN(val)) return;

        const div = document.createElement('div');
        div.className = "bubble player";
        div.innerHTML = `<span class="name">You</span>It's definitely ${val}!`;
        chatHistory.appendChild(div);
        userInput.value = "";
        chatHistory.scrollTop = chatHistory.scrollHeight;

        if (val === scenarioData[currentScenario].answer) {
            await addMessage("Maya", "✅ YES! You're carrying this team.", "maya");
            currentScenario++;
            if (currentScenario < scenarioData.length) {
                setTimeout(loadScenario, 1000);
            } else {
                await addMessage("Sam", "PIZZA TIME! 🍕 Honestly, I would have guessed 'pineapple'. Thanks for the help!", "sam");
            }
        } else {
            await addMessage("Sam", "Maya is looking at me funny. Are you sure? " + scenarioData[currentScenario].hint, "sam");
        }
    }
</script>
</body>
</html>
